<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title><link rel="apple-touch-icon" href="app-icon.png"> | 上原塗装</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

  :root {
    --navy: #1a2744;
    --navy-mid: #253560;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --bg: #f5f6f8;
    --surface: #ffffff;
    --text: #1a2744;
    --text-sub: #6b7a99;
    --border: #e2e6f0;
    --success: #2ecc71;
    --danger: #e74c3c;
    --radius: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
    color: white;
    padding: 0 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    box-shadow: 0 2px 8px rgba(26,39,68,.3);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: .05em;
  }
  .header-logo .emblem {
    width: 32px; height: 32px;
    border: 2px solid var(--gold);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    color: var(--gold);
  }
  .header-date {
    font-size: 12px;
    color: var(--gold-light);
    letter-spacing: .05em;
  }

  /* ── Tab nav ── */
  .tab-nav {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tab-nav::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex: 1;
    min-width: 80px;
    padding: 12px 8px;
    border: none;
    background: none;
    font-family: inherit;
    font-size: 12px;
    color: var(--text-sub);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all .2s;
    white-space: nowrap;
  }
  .tab-btn.active {
    color: var(--navy);
    border-bottom-color: var(--gold);
    font-weight: 700;
  }
  .tab-icon { display: block; font-size: 18px; margin-bottom: 2px; }

  /* ── Pages ── */
  .page { display: none; padding: 16px; max-width: 720px; margin: 0 auto; }
  .page.active { display: block; }

  /* ── Section card ── */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 14px;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  .card-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .1em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── Form elements ── */
  label { font-size: 12px; color: var(--text-sub); display: block; margin-bottom: 4px; font-weight: 500; }
  input, textarea, select {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 12px;
    font-family: inherit;
    font-size: 14px;
    color: var(--text);
    background: var(--bg);
    transition: border-color .2s;
    margin-bottom: 12px;
    outline: none;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--gold); background: white; }
  textarea { resize: vertical; min-height: 72px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

  /* ── Worker rows ── */
  .worker-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    background: var(--bg);
    border-radius: 6px;
    margin-bottom: 6px;
  }
  .worker-row input { margin-bottom: 0; flex: 1; }
  .worker-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--navy);
    color: var(--gold);
    font-size: 11px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    flex-shrink: 0;
  }

  /* ── Weather selector ── */
  .weather-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .weather-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: white;
    font-size: 13px;
    cursor: pointer;
    transition: all .15s;
  }
  .weather-btn.selected { border-color: var(--gold); background: #fdf6e3; font-weight: 700; }

  /* ── Progress bar ── */
  .progress-wrap { margin-bottom: 12px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-sub); margin-bottom: 4px; }
  .progress-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--navy), var(--gold)); transition: width .4s; }
  input[type=range] {
    padding: 0; background: none; border: none; margin-bottom: 0;
    -webkit-appearance: none; height: 4px;
    background: var(--border); border-radius: 2px;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--navy);
    cursor: pointer;
  }
  input[type=range]:focus { border: none; }

  /* ── Photo upload ── */
  .photo-zone {
    border: 2px dashed var(--border);
    border-radius: 8px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s;
    position: relative;
    overflow: hidden;
  }
  .photo-zone:hover { border-color: var(--gold); }
  .photo-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; margin: 0; }
  .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
  .photo-thumb {
    aspect-ratio: 1;
    border-radius: 6px;
    object-fit: cover;
    width: 100%;
    background: var(--border);
    position: relative;
  }
  .photo-thumb-wrap { position: relative; }
  .photo-del {
    position: absolute; top: 3px; right: 3px;
    width: 20px; height: 20px;
    background: rgba(231,76,60,.85);
    color: white;
    border: none; border-radius: 50%;
    font-size: 11px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  /* ── Buttons ── */
  .btn {
    padding: 12px 24px;
    border-radius: 8px;
    border: none;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all .15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--navy), var(--navy-mid));
    color: white;
    width: 100%;
    justify-content: center;
    letter-spacing: .05em;
  }
  .btn-primary:hover { opacity: .9; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(26,39,68,.3); }
  .btn-gold {
    background: var(--gold);
    color: var(--navy);
  }
  .btn-sm {
    padding: 6px 12px;
    font-size: 12px;
    border-radius: 6px;
  }
  .btn-outline {
    background: white;
    border: 1.5px solid var(--border);
    color: var(--text-sub);
  }

  /* ── Map ── */
  #map-container {
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 12px;
    position: relative;
    height: 200px;
    background: #e8eaf0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #map { width: 100%; height: 100%; }
  .map-placeholder {
    text-align: center;
    color: var(--text-sub);
  }
  .map-placeholder .icon { font-size: 32px; }
  .location-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: #eef2ff;
    color: var(--navy);
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    margin-bottom: 8px;
  }

  /* ── Report list ── */
  .report-item {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 10px;
    box-shadow: 0 1px 4px rgba(0,0,0,.05);
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all .15s;
  }
  .report-item:hover { border-left-color: var(--gold); transform: translateX(2px); }
  .report-item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
  .report-item-date { font-size: 11px; color: var(--text-sub); }
  .report-item-site { font-weight: 700; font-size: 14px; }
  .report-item-meta { display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
  .badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 500;
  }
  .badge-weather { background: #fef9e7; color: #b7770d; }
  .badge-workers { background: #eaf6ff; color: #1a6ca8; }
  .badge-progress { background: #eafaf1; color: #1e8449; }

  /* ── Detail view ── */
  .detail-header {
    background: linear-gradient(135deg, var(--navy), var(--navy-mid));
    color: white;
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 14px;
  }
  .detail-header h2 { font-size: 18px; margin-bottom: 4px; }
  .detail-header .sub { font-size: 12px; color: var(--gold-light); }
  .detail-section { margin-bottom: 10px; }
  .detail-label { font-size: 11px; color: var(--text-sub); font-weight: 700; letter-spacing: .05em; }
  .detail-value { font-size: 14px; margin-top: 2px; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }

  /* ── Empty state ── */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-sub);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 6px; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--navy);
    color: white;
    padding: 12px 24px;
    border-radius: 24px;
    font-size: 13px;
    font-weight: 500;
    box-shadow: 0 4px 20px rgba(0,0,0,.3);
    transition: transform .3s ease;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── Stats ── */
  .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 14px; }
  .stat-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px;
    text-align: center;
    box-shadow: 0 1px 4px rgba(0,0,0,.05);
  }
  .stat-num { font-size: 28px; font-weight: 700; color: var(--navy); line-height: 1; }
  .stat-label { font-size: 11px; color: var(--text-sub); margin-top: 4px; }

  @media (max-width: 400px) {
    .form-row, .form-row-3 { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
  }

  /* ── Export menu ── */
  .export-menu {
    position: fixed;
    bottom: 20px;
    right: 16px;
    z-index: 300;
  }
  .export-fab {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--navy), var(--navy-mid));
    color: white;
    border: none;
    font-size: 22px;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(26,39,68,.4);
    display: flex; align-items: center; justify-content: center;
    transition: transform .2s;
  }
  .export-fab:hover { transform: scale(1.08); }
  .export-options {
    display: none;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 10px;
    align-items: flex-end;
  }
  .export-options.open { display: flex; }
  .export-option-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: white;
    border: none;
    border-radius: 24px;
    padding: 8px 16px 8px 12px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    color: var(--navy);
    cursor: pointer;
    box-shadow: 0 2px 10px rgba(0,0,0,.15);
    white-space: nowrap;
    transition: transform .15s;
  }
  .export-option-btn:hover { transform: translateX(-3px); }
  .export-option-btn .ico { font-size: 18px; }

  /* ── Print styles ── */
  @media print {
    header, .tab-nav, .export-menu, #detailModal .btn { display: none !important; }
    body { background: white; }
    .print-sheet { display: block !important; }
    .page, #page-write, #page-history, #page-stats { display: none !important; }
    * { box-shadow: none !important; }
  }
  .print-sheet {
    display: none;
    padding: 20px;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .print-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    border-bottom: 3px solid #1a2744;
    padding-bottom: 10px;
    margin-bottom: 16px;
  }
  .print-company { font-size: 11px; color: #555; }
  .print-title { font-size: 20px; font-weight: 700; color: #1a2744; }
  .print-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    margin-bottom: 12px;
  }
  .print-table th {
    background: #1a2744;
    color: white;
    padding: 6px 8px;
    text-align: left;
    font-weight: 600;
  }
  .print-table td {
    border: 1px solid #ddd;
    padding: 6px 8px;
    vertical-align: top;
  }
  .print-table tr:nth-child(even) td { background: #f8f9fc; }
  .print-section-title {
    font-size: 11px;
    font-weight: 700;
    color: #c9a84c;
    letter-spacing: .1em;
    text-transform: uppercase;
    border-bottom: 1px solid #e2e6f0;
    padding-bottom: 4px;
    margin: 12px 0 8px;
  }
  .print-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px; }
  .print-cell { border: 1px solid #ddd; padding: 6px 8px; border-radius: 4px; }
  .print-cell-label { font-size: 10px; color: #888; }
  .print-cell-value { font-size: 13px; font-weight: 600; margin-top: 2px; }
  .print-detail { border: 1px solid #ddd; border-radius: 4px; padding: 8px; font-size: 12px; white-space: pre-wrap; min-height: 60px; }
  .print-photos { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin-top: 8px; }
  .print-photos img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 4px; border: 1px solid #ddd; }
</style>
</head>
<body>

<header>
  <div class="header-logo">
    <div class="emblem">塗</div>
    上原塗装 作業日報
  </div>
  <div class="header-date" id="headerDate"></div>
</header>

<nav class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('write')">
    <span class="tab-icon">✏️</span>記録
  </button>
  <button class="tab-btn" onclick="switchTab('history')">
    <span class="tab-icon">📋</span>履歴
  </button>
  <button class="tab-btn" onclick="switchTab('map')">
    <span class="tab-icon">🗺️</span>地図
  </button>
  <button class="tab-btn" onclick="switchTab('stats')">
    <span class="tab-icon">📊</span>集計
  </button>
</nav>

<!-- ══ WRITE PAGE ══ -->
<div id="page-write" class="page active">

  <div class="card">
    <div class="card-title">📅 基本情報</div>
    <label>作業日</label>
    <input type="date" id="workDate">
    <label>現場名</label>
    <input type="text" id="siteName" placeholder="例：笹川邸 外壁塗装">
    <div class="form-row">
      <div>
        <label>開始時刻</label>
        <input type="time" id="startTime" value="08:00">
      </div>
      <div>
        <label>終了時刻</label>
        <input type="time" id="endTime" value="17:00">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📍 現場位置</div>
    <div id="map-container">
      <div id="map"></div>
      <div class="map-placeholder" id="mapPlaceholder">
        <div class="icon">📍</div>
        <div style="font-size:13px">位置を取得中...</div>
      </div>
    </div>
    <div id="locationTag" style="display:none" class="location-tag">
      📍 <span id="locationText">取得中</span>
    </div>
    <label>現場住所</label>
    <input type="text" id="siteAddress" placeholder="例：新潟県上越市○○町1-2-3">
    <button class="btn btn-outline btn-sm" onclick="getCurrentLocation()">📡 現在地を取得</button>
  </div>

  <div class="card">
    <div class="card-title">🌤️ 天気・気温</div>
    <div class="weather-btns">
      <button class="weather-btn" onclick="selectWeather(this,'☀️ 晴れ')">☀️ 晴れ</button>
      <button class="weather-btn" onclick="selectWeather(this,'⛅ 曇り')">⛅ 曇り</button>
      <button class="weather-btn" onclick="selectWeather(this,'🌧️ 雨')">🌧️ 雨</button>
      <button class="weather-btn" onclick="selectWeather(this,'🌨️ 雪')">🌨️ 雪</button>
      <button class="weather-btn" onclick="selectWeather(this,'💨 強風')">💨 強風</button>
    </div>
    <div class="form-row">
      <div>
        <label>気温 (℃)</label>
        <input type="number" id="temperature" placeholder="例：24">
      </div>
      <div>
        <label>湿度 (%)</label>
        <input type="number" id="humidity" placeholder="例：60">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">👷 作業員</div>
    <div id="workerList">
      <div class="worker-row" data-idx="0">
        <div class="worker-avatar">上</div>
        <input type="text" value="上原淳一" readonly style="background:#f0f2f8;color:#666">
        <input type="text" placeholder="担当工程" style="flex:.8">
      </div>
    </div>
    <button class="btn btn-outline btn-sm" onclick="addWorker()" style="margin-top:4px">＋ 作業員を追加</button>
  </div>

  <div class="card">
    <div class="card-title">🔨 作業内容</div>
    <label>工種・作業区分</label>
    <select id="workType">
      <option value="">選択してください</option>
      <optgroup label="外壁">
        <option>外壁 — 高圧洗浄</option>
        <option>外壁 — 下地処理・補修</option>
        <option>外壁 — シーラー塗布</option>
        <option>外壁 — 中塗り</option>
        <option>外壁 — 上塗り</option>
        <option>外壁 — コーキング打替え</option>
      </optgroup>
      <optgroup label="屋根">
        <option>屋根 — 高圧洗浄</option>
        <option>屋根 — 下地処理</option>
        <option>屋根 — シーラー塗布</option>
        <option>屋根 — 中塗り</option>
        <option>屋根 — 上塗り</option>
      </optgroup>
      <optgroup label="付帯部">
        <option>軒天 — 塗装</option>
        <option>破風・鼻隠し — 塗装</option>
        <option>雨戸・戸袋 — 塗装</option>
        <option>シャッター — 塗装</option>
        <option>鉄部 — 塗装</option>
      </optgroup>
      <option>その他</option>
    </select>
    <label>使用塗料・材料</label>
    <input type="text" id="material" placeholder="例：エスケー化研 SKフレッシュ外壁Si 3分艶">
    <label>作業詳細</label>
    <textarea id="workDetail" placeholder="本日の作業内容を記入してください..."></textarea>
  </div>

  <div class="card">
    <div class="card-title">📈 進捗</div>
    <div class="progress-wrap">
      <div class="progress-label">
        <span>全体進捗</span>
        <span id="progressLabel">0%</span>
      </div>
      <div class="progress-bar" style="margin-bottom:8px">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <input type="range" id="progressRange" min="0" max="100" value="0" oninput="updateProgress(this.value)">
    </div>
    <div class="form-row">
      <div>
        <label>本日の施工面積 (㎡)</label>
        <input type="number" id="area" placeholder="例：45">
      </div>
      <div>
        <label>累計施工面積 (㎡)</label>
        <input type="number" id="totalArea" placeholder="例：120">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📸 現場写真</div>
    <div class="photo-zone" onclick="document.getElementById('photoInput').click()">
      <div style="font-size:28px">📷</div>
      <div style="font-size:13px;color:var(--text-sub);margin-top:4px">タップして写真を追加</div>
      <input type="file" id="photoInput" accept="image/*" multiple onchange="addPhotos(event)">
    </div>
    <div class="photo-grid" id="photoGrid"></div>
  </div>

  <div class="card">
    <div class="card-title">📝 特記事項・連絡</div>
    <textarea id="notes" placeholder="お客様からの要望、注意事項、翌日の作業予定など..."></textarea>
  </div>

  <button class="btn btn-primary" onclick="saveReport()">💾 日報を保存</button>
  <div style="height:20px"></div>
</div>

<!-- ══ HISTORY PAGE ══ -->
<div id="page-history" class="page">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <div style="font-size:15px;font-weight:700">日報一覧</div>
    <input type="month" id="filterMonth" onchange="renderHistory()" style="width:auto;margin:0;padding:6px 10px;font-size:13px">
  </div>
  <div id="historyList"></div>
</div>

<!-- ══ MAP PAGE ══ -->
<div id="page-map" class="page">
  <div class="card">
    <div class="card-title">🗺️ 現場マップ</div>
    <div id="mainMapContainer" style="height:400px;border-radius:8px;overflow:hidden;background:#e8eaf0;display:flex;align-items:center;justify-content:center">
      <div class="map-placeholder">
        <div class="icon">🗺️</div>
        <div style="font-size:13px;margin-top:6px">地図を読み込み中...</div>
      </div>
    </div>
  </div>
  <div id="mapSiteList"></div>
</div>

<!-- ══ STATS PAGE ══ -->
<div id="page-stats" class="page">
  <div class="stats-grid" id="statsGrid"></div>
  <div id="statsDetail"></div>
</div>

<!-- ══ DETAIL MODAL ══ -->
<div id="detailModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;overflow-y:auto;padding:16px">
  <div style="max-width:720px;margin:0 auto">
    <div id="detailContent"></div>
    <button class="btn btn-outline" style="width:100%;margin-top:10px" onclick="closeDetail()">✕ 閉じる</button>
  </div>
</div>

<!-- ══ PRINT SHEET ══ -->
<div class="print-sheet" id="printSheet"></div>

<!-- ══ EXPORT FAB ══ -->
<div class="export-menu" id="exportMenu">
  <div class="export-options" id="exportOptions">
    <button class="export-option-btn" onclick="exportCSV()"><span class="ico">📊</span>CSV（Excel用）</button>
    <button class="export-option-btn" onclick="exportJSON()"><span class="ico">💾</span>バックアップ保存</button>
    <button class="export-option-btn" onclick="importJSON()"><span class="ico">📂</span>バックアップ読込</button>
    <button class="export-option-btn" onclick="printAll()"><span class="ico">🖨️</span>全日報 印刷</button>
  </div>
  <button class="export-fab" onclick="toggleExport()" title="出力メニュー">⬆️</button>
</div>
<input type="file" id="importInput" accept=".json" style="display:none" onchange="doImport(event)">

<div class="toast" id="toast"></div>

<script>
// ── State ──────────────────────────────────────────
let reports = JSON.parse(localStorage.getItem('uehara_reports') || '[]');
let photos = [];
let selectedWeather = '';
let currentLat = null, currentLng = null;
let leafletMap = null, mainLeafletMap = null;

// ── Init ──────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const d = new Date();
  document.getElementById('workDate').value = d.toISOString().slice(0,10);
  document.getElementById('headerDate').textContent =
    d.toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'short'});

  const m = d.toISOString().slice(0,7);
  document.getElementById('filterMonth').value = m;

  loadLeaflet();
  renderHistory();
  renderStats();
});

// ── Leaflet map ────────────────────────────────────
function loadLeaflet() {
  if (document.querySelector('link[href*="leaflet"]')) return;
  const css = document.createElement('link');
  css.rel = 'stylesheet';
  css.href = 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css';
  document.head.appendChild(css);
  const js = document.createElement('script');
  js.src = 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js';
  js.onload = () => {
    initWriteMap();
    getCurrentLocation();
  };
  document.head.appendChild(js);
}

function initWriteMap() {
  const c = document.getElementById('map-container');
  document.getElementById('mapPlaceholder').style.display = 'none';
  const lat = 37.15, lng = 138.24; // 上越市
  leafletMap = L.map('map').setView([lat, lng], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(leafletMap);
}

function initMainMap() {
  const el = document.getElementById('mainMapContainer');
  el.innerHTML = '<div id="mainMap" style="width:100%;height:100%"></div>';
  const lat = 37.15, lng = 138.24;
  mainLeafletMap = L.map('mainMap').setView([lat, lng], 11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(mainLeafletMap);
  renderMapMarkers();
}

function renderMapMarkers() {
  if (!mainLeafletMap) return;
  reports.forEach(r => {
    if (r.lat && r.lng) {
      const m = L.marker([r.lat, r.lng]).addTo(mainLeafletMap);
      m.bindPopup(`<b>${r.siteName}</b><br>${r.workDate}<br>${r.workType||''}`);
    }
  });
}

function getCurrentLocation() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(pos => {
    currentLat = pos.coords.latitude;
    currentLng = pos.coords.longitude;
    const tag = document.getElementById('locationTag');
    const txt = document.getElementById('locationText');
    txt.textContent = `${currentLat.toFixed(4)}, ${currentLng.toFixed(4)}`;
    tag.style.display = 'inline-flex';
    if (leafletMap) {
      leafletMap.setView([currentLat, currentLng], 15);
      L.marker([currentLat, currentLng]).addTo(leafletMap)
        .bindPopup('現在地').openPopup();
    }
    // Reverse geocode
    fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${currentLat}&lon=${currentLng}`)
      .then(r=>r.json()).then(d=>{
        const addr = d.address;
        const str = [addr.prefecture, addr.city||addr.town||addr.village, addr.road, addr.house_number]
          .filter(Boolean).join('');
        if (str) document.getElementById('siteAddress').value = str;
        txt.textContent = str || `${currentLat.toFixed(4)}, ${currentLng.toFixed(4)}`;
      }).catch(()=>{});
  }, ()=>{}, {enableHighAccuracy:true});
}

// ── Weather ──────────────────────────────────────
function selectWeather(btn, val) {
  document.querySelectorAll('.weather-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedWeather = val;
}

// ── Progress ─────────────────────────────────────
function updateProgress(v) {
  document.getElementById('progressLabel').textContent = v + '%';
  document.getElementById('progressFill').style.width = v + '%';
}

// ── Workers ──────────────────────────────────────
let workerCount = 1;
function addWorker() {
  workerCount++;
  const div = document.createElement('div');
  div.className = 'worker-row';
  div.dataset.idx = workerCount;
  div.innerHTML = `
    <div class="worker-avatar" style="background:#e8eaf0;color:#6b7a99">${workerCount}</div>
    <input type="text" placeholder="作業員名">
    <input type="text" placeholder="担当工程" style="flex:.8">
    <button onclick="this.parentElement.remove()" style="background:none;border:none;cursor:pointer;color:#e74c3c;font-size:18px;line-height:1">×</button>
  `;
  document.getElementById('workerList').appendChild(div);
}

function getWorkers() {
  return Array.from(document.querySelectorAll('#workerList .worker-row')).map(row => {
    const inputs = row.querySelectorAll('input');
    return { name: inputs[0].value, role: inputs[1].value };
  }).filter(w => w.name);
}

// ── Photos ───────────────────────────────────────
function addPhotos(e) {
  Array.from(e.target.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      photos.push(ev.target.result);
      renderPhotoGrid();
    };
    reader.readAsDataURL(file);
  });
}
function renderPhotoGrid() {
  const g = document.getElementById('photoGrid');
  g.innerHTML = photos.map((src, i) => `
    <div class="photo-thumb-wrap">
      <img src="${src}" class="photo-thumb">
      <button class="photo-del" onclick="removePhoto(${i})">×</button>
    </div>
  `).join('');
}
function removePhoto(i) { photos.splice(i,1); renderPhotoGrid(); }

// ── Save ─────────────────────────────────────────
function saveReport() {
  const siteName = document.getElementById('siteName').value.trim();
  const workDate = document.getElementById('workDate').value;
  if (!siteName) { showToast('⚠️ 現場名を入力してください'); return; }
  if (!workDate)  { showToast('⚠️ 作業日を入力してください'); return; }

  const report = {
    id: Date.now(),
    workDate,
    siteName,
    siteAddress: document.getElementById('siteAddress').value,
    startTime: document.getElementById('startTime').value,
    endTime:   document.getElementById('endTime').value,
    weather: selectedWeather,
    temperature: document.getElementById('temperature').value,
    humidity:    document.getElementById('humidity').value,
    workType:    document.getElementById('workType').value,
    material:    document.getElementById('material').value,
    workDetail:  document.getElementById('workDetail').value,
    progress:    document.getElementById('progressRange').value,
    area:        document.getElementById('area').value,
    totalArea:   document.getElementById('totalArea').value,
    notes:       document.getElementById('notes').value,
    workers: getWorkers(),
    photos,
    lat: currentLat,
    lng: currentLng,
  };

  reports.unshift(report);
  localStorage.setItem('uehara_reports', JSON.stringify(reports));
  photos = [];
  renderPhotoGrid();
  renderHistory();
  renderStats();
  showToast('✅ 日報を保存しました');
  switchTab('history');
}

// ── History ──────────────────────────────────────
function renderHistory() {
  const month = document.getElementById('filterMonth').value;
  const list = document.getElementById('historyList');
  const filtered = month
    ? reports.filter(r => r.workDate.startsWith(month))
    : reports;

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📋</div>
      <div class="empty-title">日報がありません</div>
      <div style="font-size:13px">「記録」タブから日報を作成しましょう</div>
    </div>`;
    return;
  }

  list.innerHTML = filtered.map(r => `
    <div class="report-item" onclick="showDetail(${r.id})">
      <div class="report-item-header">
        <div class="report-item-site">${r.siteName}</div>
        <div class="report-item-date">${r.workDate}</div>
      </div>
      <div style="font-size:12px;color:var(--text-sub);margin-top:2px">${r.siteAddress||''}</div>
      <div class="report-item-meta">
        ${r.weather ? `<span class="badge badge-weather">${r.weather}</span>` : ''}
        ${r.workers?.length ? `<span class="badge badge-workers">👷 ${r.workers.length}名</span>` : ''}
        ${r.progress ? `<span class="badge badge-progress">進捗 ${r.progress}%</span>` : ''}
        ${r.workType ? `<span class="badge" style="background:#f0f0f0;color:#555">${r.workType}</span>` : ''}
      </div>
    </div>
  `).join('');
}

// ── Detail ───────────────────────────────────────
function showDetail(id) {
  const r = reports.find(x => x.id === id);
  if (!r) return;
  const modal = document.getElementById('detailModal');
  const content = document.getElementById('detailContent');
  content.innerHTML = `
    <div class="detail-header">
      <h2>${r.siteName}</h2>
      <div class="sub">${r.workDate}　${r.startTime||''}〜${r.endTime||''}</div>
      ${r.siteAddress ? `<div class="sub" style="margin-top:4px">📍 ${r.siteAddress}</div>` : ''}
    </div>
    ${r.lat && r.lng ? `<div id="detailMap" style="height:180px;border-radius:8px;overflow:hidden;margin-bottom:10px"></div>` : ''}
    <div class="card">
      <div class="detail-grid">
        <div><div class="detail-label">天気</div><div class="detail-value">${r.weather||'—'}</div></div>
        <div><div class="detail-label">気温 / 湿度</div><div class="detail-value">${r.temperature||'—'}℃ / ${r.humidity||'—'}%</div></div>
        <div><div class="detail-label">進捗</div><div class="detail-value">${r.progress||0}%</div></div>
        <div><div class="detail-label">施工面積</div><div class="detail-value">${r.area||'—'}㎡</div></div>
      </div>
      <div class="detail-section">
        <div class="detail-label">工種</div>
        <div class="detail-value">${r.workType||'—'}</div>
      </div>
      <div class="detail-section">
        <div class="detail-label">使用塗料</div>
        <div class="detail-value">${r.material||'—'}</div>
      </div>
      <div class="detail-section">
        <div class="detail-label">作業内容</div>
        <div class="detail-value" style="white-space:pre-wrap">${r.workDetail||'—'}</div>
      </div>
      ${r.workers?.length ? `
      <div class="detail-section">
        <div class="detail-label">作業員</div>
        <div>${r.workers.map(w=>`<span class="badge" style="background:#eaf6ff;color:#1a6ca8;margin:2px">${w.name}${w.role?' ('+w.role+')':''}</span>`).join('')}</div>
      </div>` : ''}
      ${r.notes ? `
      <div class="detail-section">
        <div class="detail-label">特記事項</div>
        <div class="detail-value" style="white-space:pre-wrap">${r.notes}</div>
      </div>` : ''}
    </div>
    ${r.photos?.length ? `
    <div class="card">
      <div class="card-title">📸 現場写真</div>
      <div class="photo-grid">${r.photos.map(src=>`<img src="${src}" class="photo-thumb">`).join('')}</div>
    </div>` : ''}
    <div style="text-align:right;padding:0 4px 4px">
      <button class="btn btn-sm" style="background:#eaf6ff;color:#1a6ca8;border:none;margin-right:6px" onclick="printOne(${r.id})">🖨️ 印刷</button>
      <button class="btn btn-sm" style="background:#fef0f0;color:#e74c3c;border:none" onclick="deleteReport(${r.id})">🗑️ 削除</button>
    </div>
  `;
  modal.style.display = 'block';
  if (r.lat && r.lng && window.L) {
    setTimeout(() => {
      const dm = L.map('detailMap').setView([r.lat, r.lng], 15);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(dm);
      L.marker([r.lat, r.lng]).addTo(dm).bindPopup(r.siteName).openPopup();
    }, 100);
  }
}
function closeDetail() { document.getElementById('detailModal').style.display = 'none'; }
function deleteReport(id) {
  if (!confirm('この日報を削除しますか？')) return;
  reports = reports.filter(r => r.id !== id);
  localStorage.setItem('uehara_reports', JSON.stringify(reports));
  closeDetail(); renderHistory(); renderStats(); renderMapPage();
  showToast('🗑️ 削除しました');
}

// ── Map page ─────────────────────────────────────
function renderMapPage() {
  const list = document.getElementById('mapSiteList');
  const sites = [...new Map(reports.map(r=>[r.siteName, r])).values()];
  list.innerHTML = sites.map(r => `
    <div class="card" style="cursor:pointer" onclick="focusMapSite(${r.lat||0},${r.lng||0},'${r.siteName.replace(/'/g,"\\'")}')">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:20px">📍</span>
        <div>
          <div style="font-weight:700;font-size:14px">${r.siteName}</div>
          <div style="font-size:12px;color:var(--text-sub)">${r.siteAddress||'住所未登録'}</div>
        </div>
      </div>
    </div>
  `).join('') || `<div class="empty-state"><div class="empty-icon">🗺️</div><div class="empty-title">現場データがありません</div></div>`;
}
function focusMapSite(lat, lng, name) {
  if (!mainLeafletMap || !lat) return;
  mainLeafletMap.setView([lat, lng], 15);
}

// ── Stats ─────────────────────────────────────────
function renderStats() {
  const totalDays = reports.length;
  const sites = new Set(reports.map(r=>r.siteName)).size;
  const totalArea = reports.reduce((a,r)=>a+(parseFloat(r.area)||0),0);
  const avgProgress = reports.length
    ? Math.round(reports.reduce((a,r)=>a+(parseInt(r.progress)||0),0)/reports.length)
    : 0;

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="stat-num">${totalDays}</div><div class="stat-label">総日報数</div></div>
    <div class="stat-card"><div class="stat-num">${sites}</div><div class="stat-label">現場数</div></div>
    <div class="stat-card"><div class="stat-num">${totalArea.toFixed(0)}</div><div class="stat-label">総施工面積 ㎡</div></div>
    <div class="stat-card"><div class="stat-num">${avgProgress}%</div><div class="stat-label">平均進捗</div></div>
  `;

  // 月別サマリ
  const byMonth = {};
  reports.forEach(r => {
    const m = r.workDate.slice(0,7);
    if (!byMonth[m]) byMonth[m] = {count:0, area:0};
    byMonth[m].count++;
    byMonth[m].area += parseFloat(r.area)||0;
  });
  const months = Object.entries(byMonth).sort((a,b)=>b[0]<a[0]?-1:1);
  document.getElementById('statsDetail').innerHTML = months.length ? `
    <div class="card">
      <div class="card-title">📅 月別実績</div>
      ${months.map(([m,v])=>`
        <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px">
          <span style="font-weight:500">${m}</span>
          <span style="color:var(--text-sub)">${v.count}日　${v.area}㎡</span>
        </div>
      `).join('')}
    </div>` : '';
}

// ── Tab switch ────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', ['write','history','map','stats'][i] === tab);
  });
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');

  if (tab === 'map') {
    renderMapPage();
    if (window.L && !mainLeafletMap) setTimeout(initMainMap, 100);
    else if (mainLeafletMap) { mainLeafletMap.invalidateSize(); renderMapMarkers(); }
  }
  if (tab === 'history') renderHistory();
  if (tab === 'stats') renderStats();
}

// ── Export / Print ────────────────────────────────
function toggleExport() {
  const o = document.getElementById('exportOptions');
  o.classList.toggle('open');
}
document.addEventListener('click', e => {
  if (!document.getElementById('exportMenu').contains(e.target))
    document.getElementById('exportOptions').classList.remove('open');
});

// 🖨️ 印刷（全日報）
function printAll() {
  document.getElementById('exportOptions').classList.remove('open');
  const sheet = document.getElementById('printSheet');
  const today = new Date().toLocaleDateString('ja-JP');
  sheet.innerHTML = `
    <div class="print-header">
      <div>
        <div class="print-company">上原塗装　作業日報</div>
        <div class="print-title">日報一覧</div>
        <div class="print-company">出力日：${today}　全${reports.length}件</div>
      </div>
      <div style="font-size:28px;color:#1a2744">塗</div>
    </div>
    <table class="print-table">
      <thead>
        <tr>
          <th>日付</th><th>現場名</th><th>工種</th><th>天気</th>
          <th>気温</th><th>作業員</th><th>面積(㎡)</th><th>進捗</th><th>使用塗料</th>
        </tr>
      </thead>
      <tbody>
        ${reports.map(r=>`
          <tr>
            <td>${r.workDate}</td>
            <td><b>${r.siteName}</b>${r.siteAddress?'<br><span style="font-size:10px;color:#888">'+r.siteAddress+'</span>':''}</td>
            <td>${r.workType||'—'}</td>
            <td>${r.weather||'—'}</td>
            <td>${r.temperature?r.temperature+'℃':'—'}</td>
            <td>${r.workers?.map(w=>w.name).join('、')||'—'}</td>
            <td>${r.area||'—'}</td>
            <td>${r.progress||0}%</td>
            <td style="font-size:10px">${r.material||'—'}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
  window.print();
}

// 🖨️ 1件印刷（詳細モーダルから）
function printOne(id) {
  document.getElementById('exportOptions').classList.remove('open');
  const r = reports.find(x=>x.id===id);
  if (!r) return;
  const sheet = document.getElementById('printSheet');
  const today = new Date().toLocaleDateString('ja-JP');
  sheet.innerHTML = `
    <div class="print-header">
      <div>
        <div class="print-company">上原塗装</div>
        <div class="print-title">作業日報</div>
      </div>
      <div style="font-size:11px;color:#555;text-align:right">出力日：${today}</div>
    </div>
    <div class="print-grid">
      <div class="print-cell"><div class="print-cell-label">作業日</div><div class="print-cell-value">${r.workDate}</div></div>
      <div class="print-cell"><div class="print-cell-label">現場名</div><div class="print-cell-value">${r.siteName}</div></div>
      <div class="print-cell"><div class="print-cell-label">作業時間</div><div class="print-cell-value">${r.startTime||''}〜${r.endTime||''}</div></div>
      <div class="print-cell"><div class="print-cell-label">天気</div><div class="print-cell-value">${r.weather||'—'}</div></div>
      <div class="print-cell"><div class="print-cell-label">気温</div><div class="print-cell-value">${r.temperature?r.temperature+'℃':'—'}</div></div>
      <div class="print-cell"><div class="print-cell-label">湿度</div><div class="print-cell-value">${r.humidity?r.humidity+'%':'—'}</div></div>
      <div class="print-cell"><div class="print-cell-label">施工面積</div><div class="print-cell-value">${r.area?r.area+'㎡':'—'}</div></div>
      <div class="print-cell"><div class="print-cell-label">進捗</div><div class="print-cell-value">${r.progress||0}%</div></div>
    </div>
    <div class="print-section-title">📍 現場情報</div>
    <table class="print-table" style="margin-bottom:10px">
      <tr><th width="120">住所</th><td>${r.siteAddress||'—'}</td></tr>
      <tr><th>工種</th><td>${r.workType||'—'}</td></tr>
      <tr><th>使用塗料・材料</th><td>${r.material||'—'}</td></tr>
      <tr><th>作業員</th><td>${r.workers?.map(w=>`${w.name}${w.role?' ('+w.role+')':''}`).join('　')||'—'}</td></tr>
    </table>
    <div class="print-section-title">🔨 作業内容</div>
    <div class="print-detail">${r.workDetail||''}</div>
    ${r.notes ? `
    <div class="print-section-title">📝 特記事項</div>
    <div class="print-detail">${r.notes}</div>` : ''}
    ${r.photos?.length ? `
    <div class="print-section-title">📸 現場写真</div>
    <div class="print-photos">${r.photos.map(src=>`<img src="${src}">`).join('')}</div>` : ''}
  `;
  window.print();
}

// 📊 CSV出力
function exportCSV() {
  document.getElementById('exportOptions').classList.remove('open');
  const BOM = '\uFEFF';
  const header = ['作業日','現場名','住所','開始','終了','天気','気温(℃)','湿度(%)','工種','使用塗料','進捗(%)','施工面積(㎡)','累計面積(㎡)','作業員','作業内容','特記事項'];
  const rows = reports.map(r => [
    r.workDate, r.siteName, r.siteAddress||'',
    r.startTime||'', r.endTime||'',
    r.weather||'', r.temperature||'', r.humidity||'',
    r.workType||'', r.material||'',
    r.progress||0, r.area||'', r.totalArea||'',
    r.workers?.map(w=>w.name).join('／')||'',
    (r.workDetail||'').replace(/\n/g,' '),
    (r.notes||'').replace(/\n/g,' ')
  ].map(v => `"${String(v).replace(/"/g,'""')}"`));

  const csv = BOM + [header.map(h=>`"${h}"`), ...rows].map(r=>r.join(',')).join('\n');
  download(csv, `上原塗装_日報_${new Date().toISOString().slice(0,10)}.csv`, 'text/csv');
  showToast('📊 CSVを出力しました');
}

// 💾 JSONバックアップ
function exportJSON() {
  document.getElementById('exportOptions').classList.remove('open');
  const data = JSON.stringify({ version:1, exported: new Date().toISOString(), reports }, null, 2);
  download(data, `上原塗装_日報バックアップ_${new Date().toISOString().slice(0,10)}.json`, 'application/json');
  showToast('💾 バックアップを保存しました');
}

// 📂 JSON読込
function importJSON() {
  document.getElementById('exportOptions').classList.remove('open');
  document.getElementById('importInput').click();
}
function doImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      const imported = data.reports || data;
      if (!Array.isArray(imported)) throw new Error();
      if (!confirm(`${imported.length}件の日報を読み込みます。現在のデータに追加しますか？`)) return;
      const existingIds = new Set(reports.map(r=>r.id));
      const newOnes = imported.filter(r=>!existingIds.has(r.id));
      reports = [...newOnes, ...reports].sort((a,b)=>b.workDate.localeCompare(a.workDate));
      localStorage.setItem('uehara_reports', JSON.stringify(reports));
      renderHistory(); renderStats();
      showToast(`✅ ${newOnes.length}件を追加しました`);
    } catch { showToast('⚠️ 読み込みに失敗しました'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ダウンロードヘルパー
function download(content, filename, type) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], {type}));
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
